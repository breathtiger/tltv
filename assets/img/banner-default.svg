<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="500" viewBox="0 0 1400 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#132040"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="500" fill="url(#bg)"/>
  <!-- decorative lines -->
  <line x1="0" y1="180" x2="1400" y2="180" stroke="rgba(212,160,23,0.08)" stroke-width="1"/>
  <line x1="0" y1="320" x2="1400" y2="320" stroke="rgba(212,160,23,0.08)" stroke-width="1"/>
  <line x1="350" y1="0" x2="350" y2="500" stroke="rgba(212,160,23,0.06)" stroke-width="1"/>
  <line x1="1050" y1="0" x2="1050" y2="500" stroke="rgba(212,160,23,0.06)" stroke-width="1"/>
  <!-- icon -->
  <text x="700" y="175" text-anchor="middle" font-family="sans-serif" font-size="56" fill="rgba(212,160,23,0.5)">📺</text>
  <!-- title -->
  <text x="700" y="265" text-anchor="middle" font-family="'Noto Sans TC', 'PingFang TC', sans-serif"
    font-size="52" fill="#d4a017" font-weight="700" letter-spacing="8">天良衛星電視台</text>
  <!-- subtitle -->
  <text x="700" y="310" text-anchor="middle" font-family="sans-serif"
    font-size="20" fill="rgba(255,255,255,0.5)" letter-spacing="4">Tien Liang TV</text>
  <!-- hint -->
  <text x="700" y="380" text-anchor="middle" font-family="sans-serif"
    font-size="14" fill="rgba(255,255,255,0.25)">請上傳 Banner 圖片至 Google Drive 並更新 config.js 中的 BANNER_IMG_ID</text>
</svg>
